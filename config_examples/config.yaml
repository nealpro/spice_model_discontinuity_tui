io:
  # output_dir: base directory for results.csv and all generated files.
  # Default when unset: spice_cli_output/ under the current working directory.
  output_dir: "spice_cli_output"
  files:
    - "tests/files/simulation_data_sample.csv"

detection:
  # Robust detector settings:
  #   - `sensitivity` is the MAD-z-score sigma threshold (default 50.0).
  sensitivity: 5.0
  min_prominence: 20.0
  min_separation: 3

analysis:
  independent_col: "V(X1.GATE,X1.SOURCE)"  # CSV column used as the x-axis
  group_by: "V(X1.SOURCE,X1.BULK)"          # CSV column to partition rows before detection

plots:
  figsize: [16, 12]
  dpi: 180
  ylabel: "$I_D$ (µA)"
  unit_scale: 1.0e6
  xlabel: "$V_{GS}$ (V)"
  xlim: [0.0, 1.8]
  tick_step: 0.2
  zoom_padding: 0.05
  zoom_merge_within: 0.02
  title_prefix: "NFET"
  grouping:
    # Family-of-curves axis: `column` is the raw CSV column name used to group curves.
    column: "V(X1.SOURCE,X1.BULK)"
    min: 0.0
    max: 1.5
    step: 0.1
    skip: []
    label_template: "$V_{{SB}} = {value:.2f}$ V"
